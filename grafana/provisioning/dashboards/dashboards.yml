# =============================================================================
# Grafana Dashboard Provisioning
# DDM501 - Lab 4: Monitoring & Production Deployment
#
# This file configures automatic dashboard loading from the dashboards folder.
# =============================================================================

apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
