groups:
  - name: api_alerts
    rules:
      # ========================================================================
      # TODO 1: High Error Rate Alert
      # ========================================================================
      # Trigger when error rate (5xx responses) exceeds 10% for 2 minutes
      # Severity: critical
      
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) 
          / clamp_min(rate(http_requests_total[5m]), 0.001) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%)"
      
      # ========================================================================
      # TODO 2: High Latency Alert
      # ========================================================================
      # Trigger when P95 latency exceeds 1 second for 5 minutes
      # Severity: warning
      
      # - alert: HighLatency
      #   expr: |
      #     histogram_quantile(0.95, 
      #       rate(http_request_duration_seconds_bucket[5m])
      #     ) > 1
      #   for: 5m
      #   labels:
      #     severity: warning
      #   annotations:
      #     summary: "High latency detected"
      #     description: "P95 latency is {{ $value }}s (threshold: 1s)"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, 
            sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 latency is {{ $value }}s (threshold: 1s)"
      
      # ========================================================================
      # TODO 3: Service Down Alert
      # ========================================================================
      # Trigger when the API service is unreachable
      # Severity: critical
      
      # - alert: ServiceDown
      #   expr: up{job="movie-rating-api"} == 0
      #   for: 1m
      #   labels:
      #     severity: critical
      #   annotations:
      #     summary: "Movie Rating API is down"
      #     description: "The API service has been unreachable for more than 1 minute"

      - alert: ServiceDown
        expr: up{job="movie-rating-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Movie Rating API is down"
          description: "The API service has been unreachable for more than 1 minute"
      
