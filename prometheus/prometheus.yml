global:
  # How frequently to scrape targets
  scrape_interval: 15s
  
  # How frequently to evaluate rules
  evaluation_interval: 15s

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # TODO: Add alertmanager target if configured
          # - targets: ['alertmanager:9093']

# Rule files for alerting
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # ==========================================================================
  # Prometheus self-monitoring
  # ==========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    
    # Labels added to all metrics from this job
    # relabel_configs:
    #   - source_labels: [__address__]
    #     target_label: instance
    #     replacement: prometheus

  # ==========================================================================
  # TODO 1: Configure Movie Rating API scraping
  # ==========================================================================
  # Requirements:
  # - Job name: 'movie-rating-api'
  # - Target: 'api:8000' (Docker service name)
  # - Metrics path: '/metrics'
  # - Scrape interval: 10s (more frequent than default)
  
  # - job_name: 'movie-rating-api'
  #   static_configs:
  #     - targets: ['api:8000']
  #   metrics_path: '/metrics'
  #   scrape_interval: 10s
  #   
  #   # Optional: Add custom labels
  #   # relabel_configs:
  #   #   - source_labels: [__address__]
  #   #     target_label: service
  #   #     replacement: movie-rating-api

  - job_name: 'movie-rating-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: movie-rating-api

