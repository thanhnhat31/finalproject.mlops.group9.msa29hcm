name: Backend CI

on:
  push:
    branches: [release]
  pull_request:
    branches: [release]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: nhatmsa/finalprojectmlops

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip<26" setuptools wheel
          pip install numpy==1.26.2 cython
          pip install --no-build-isolation --no-use-pep517 scikit-surprise==1.1.3
          pip install -r requirements.txt --no-build-isolation

      - name: Run tests
        run: |
          python -m pytest tests/ -v --maxfail=1

      - name: Build
        run: |
          docker build -t local-finalprojectmlops-ci -f Dockerfile .

  publish_image:
    name: Build And Push Docker Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=release
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish CI summary
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "## Backend CI Artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`release\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`nhatmsa/finalprojectmlops:sha-${SHORT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Floating tag: \`nhatmsa/finalprojectmlops:release\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Local pull command: \`docker pull nhatmsa/finalprojectmlops:release\`" >> "$GITHUB_STEP_SUMMARY"
