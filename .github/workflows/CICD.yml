name: Backend CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: nhatqkit/finalprojectmlops

jobs:
  test:
    name: Quality Checks
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       ((github.base_ref == 'staging' && github.head_ref == 'dev') ||
        (github.base_ref == 'main' && github.head_ref == 'staging')))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip<26" setuptools wheel
          grep -v "^scikit-surprise==" requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --maxfail=1

  build_image_pr:
    name: Build Image (PR)
    if: |
      github.event_name == 'pull_request' &&
      ((github.base_ref == 'staging' && github.head_ref == 'dev') ||
       (github.base_ref == 'main' && github.head_ref == 'staging'))
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set environment tag
        id: envtag
        shell: bash
        run: |
          if [ "${{ github.base_ref }}" = "staging" ]; then
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          else
            echo "tag=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image with environment tag
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.envtag.outputs.tag }}-pr-${{ github.event.pull_request.number }}
            ${{ env.IMAGE_NAME }}:${{ steps.envtag.outputs.tag }}-${{ github.sha }}
